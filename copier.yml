_min_copier_version: "9.0"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml
_preserve_symlinks: true
_exclude:
  - node_modules
  - "**/node_modules"
  - dist
  - "**/dist"
  - .env
  - .env.op
  - .git
  - bun.lock
  - web/bun.lock
  - .dev.vars.example
  - wrangler.jsonc.jinja
  - mise.toml.jinja
  - .github/workflows/preview.yml
  - .github/workflows/preview-cleanup.yml
  - GUIDELINES.md
_tasks:
  - ["node", "scripts/post-copy.mjs"]
_message_after_copy: |
  {{ app_title }} is ready in {{ _copier_conf.dst_path }}.

  Next:
    cd {{ _copier_conf.dst_path }}
    pnpm setup
    pnpm dev

  Local URL: http://localhost:3000
  See OWNER_GUIDE.md for the plain-language operating guide.

project_slug:
  type: str
  help: Project slug (lowercase letters, digits, and hyphens).
  placeholder: my-saas
  validator: >-
    {% if not (project_slug | regex_search('^[a-z][a-z0-9-]*$')) -%}
    Use lowercase letters, digits, and hyphens, starting with a letter.
    {%- endif %}
app_title:
  type: str
  help: Human-readable product name.
  default: "{{ project_slug | replace('-', ' ') | title }}"
app_tagline:
  type: str
  help: One-line promise shown on the landing page.
  default: Turn an idea into useful work in minutes.
app_description:
  type: str
  help: Short product description used in metadata and documentation.
  default: A focused SaaS product built from the Portable SaaS Template.
design_system:
  type: str
  help: Visual design system. All three remain available after generation.
  default: nothing
  choices:
    "Nothing — monochrome instrument panel with red accent": nothing
    "Apex — warm industrial paper with vermilion accent": apex
    "Onyx — polished obsidian with sapphire accent": onyx
include_team_workspaces:
  type: bool
  default: true
include_support:
  type: bool
  default: true
include_admin:
  type: bool
  default: true
include_billing:
  type: bool
  default: false
include_ai:
  type: bool
  default: true
include_email:
  type: bool
  default: true
include_object_storage:
  type: bool
  default: false
default_ai_provider:
  type: str
  default: mock
  choices:
    Mock development provider: mock
    OpenAI: openai
    Anthropic: anthropic
