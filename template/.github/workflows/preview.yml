# PR preview deploys for projects that use Durable Objects.
#
# Cloudflare Workers Builds auto-comments preview URLs on PRs, but disables
# them whenever the Worker has DO bindings (DO state is global per-Worker and
# can't be partitioned per version). This workflow fills that gap: when
# wrangler.jsonc declares a DO binding, each PR gets its own Worker named
# `<worker_name>-pr-<pr_number>` with naturally isolated DO state.
#
# When the project does not use DOs, the deploy job is skipped so Workers
# Builds' native preview URLs remain the source of truth.
#
# Required repo secrets — one of:
#   CLOUDFLARE_API_TOKEN                          (scoped token, preferred:
#                                                  Workers Scripts: Edit + D1: Edit)
#   CLOUDFLARE_API_KEY + CLOUDFLARE_EMAIL         (Global API Key fallback)
# Plus:
#   CLOUDFLARE_ACCOUNT_ID

name: PR preview (Durable Objects fallback)

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_do: ${{ steps.parse.outputs.has_do }}
      worker_name: ${{ steps.parse.outputs.worker_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - id: parse
        run: |
          node -e '
            const fs = require("fs");
            const raw = fs.readFileSync("wrangler.jsonc", "utf8")
              .replace(/\/\*[\s\S]*?\*\//g, "")
              .replace(/(^|[^:])\/\/.*$/gm, "$1");
            const cfg = JSON.parse(raw);
            const hasDo = (cfg.durable_objects?.bindings?.length ?? 0) > 0;
            const out = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(out, `has_do=${hasDo}\n`);
            fs.appendFileSync(out, `worker_name=${cfg.name}\n`);
          '
          cat "$GITHUB_OUTPUT"

  deploy:
    needs: detect
    if: >-
      needs.detect.outputs.has_do == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
      CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_NAME: ${{ needs.detect.outputs.worker_name }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # wrangler invokes itself under `node` (its bin has a node shebang), so
      # the runner's Node version controls whether wrangler runs at all —
      # wrangler 4 requires Node ≥ 22, while ubuntu-latest defaults to 20.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      # PR Workers share the production D1 (per CLAUDE.md: schema changes must
      # stay forward-compatible until merge), so we deliberately do NOT run
      # `ci:build:preview` here — that script applies migrations against the
      # separate `talkbuilder-db-preview` D1, which is reserved for the
      # standalone preview Worker. Inlined steps below: install, SPA build,
      # tests. No migrations.
      - name: Install dependencies
        run: |
          bun install
          bun install --cwd web

      - name: Build SPA
        run: cd web && bun run build

      - name: Run tests
        run: bun run test

      # Cloudflare Workflows names are account-scoped: two per-PR Workers
      # binding "scan-workflow" share the *latest-deployed* workflow class
      # definition, so a sibling PR's deploy can silently swap the workflow
      # code on this PR's Worker. Suffix the workflow name(s) with the PR
      # number before deploy so each Worker owns its own workflow class.
      - name: Suffix workflow names with PR number
        run: |
          node -e '
            const fs = require("fs");
            const path = "wrangler.jsonc";
            const src = fs.readFileSync(path, "utf8");
            // Preserve comments — only rewrite string literals on workflow name lines.
            const out = src.replace(
              /("workflows"\s*:\s*\[[\s\S]*?\])/g,
              (block) => block.replace(
                /("name"\s*:\s*")([^"]+)(")/g,
                (_, a, name, c) => a + name + "-pr-" + process.env.PR_NUMBER + c,
              ),
            );
            fs.writeFileSync(path, out);
            console.log("workflow names suffixed with -pr-" + process.env.PR_NUMBER);
          '
          grep -A1 '"workflows"' wrangler.jsonc | head -10

      - name: Deploy preview Worker and capture URL
        id: deploy
        run: |
          set -euo pipefail
          PREVIEW_NAME="${WORKER_NAME}-pr-${PR_NUMBER}"
          echo "Deploying $PREVIEW_NAME ..."

          # First deploy creates the Worker (so we can attach secrets to it)
          # and prints the canonical *.workers.dev URL.
          deploy_out=$(bunx wrangler deploy --name "$PREVIEW_NAME" 2>&1)
          printf '%s\n' "$deploy_out"

          url=$(printf '%s' "$deploy_out" \
            | grep -oE "https://${PREVIEW_NAME}\.[a-z0-9-]+\.workers\.dev" \
            | head -1)

          if [ -z "$url" ]; then
            echo "::error::Could not extract preview URL from wrangler output" >&2
            exit 1
          fi

          # Mint a per-preview BETTER_AUTH_SECRET on first deploy. wrangler
          # secret list returns non-zero if the secret isn't set yet, so we
          # only put it once per preview Worker.
          if ! bunx wrangler secret list --name "$PREVIEW_NAME" 2>/dev/null \
              | grep -q '"BETTER_AUTH_SECRET"'; then
            openssl rand -base64 32 \
              | bunx wrangler secret put BETTER_AUTH_SECRET --name "$PREVIEW_NAME"
          fi

          # Redeploy with BETTER_AUTH_URL set so Better Auth issues redirects
          # and cookies against the real preview origin.
          bunx wrangler deploy --name "$PREVIEW_NAME" --var BETTER_AUTH_URL:"$url"

          {
            echo "preview_name=$PREVIEW_NAME"
            echo "url=$url"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing preview comment
        uses: peter-evans/find-comment@v3
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- preview-deploy-marker -->

      - name: Upsert preview URL comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- preview-deploy-marker -->
            **Preview deployed** (Durable Objects fallback)

            - URL: ${{ steps.deploy.outputs.url }}
            - Worker: `${{ steps.deploy.outputs.preview_name }}`
            - Commit: ${{ github.event.pull_request.head.sha }}

            Each PR gets its own Worker (so its own DO namespace). The preview shares the production D1; PR migrations are skipped — keep schema changes forward-compatible until merge.
